name: ci
on:
  pull_request:
  push:
    branches: [ "main" ]

jobs:
  test:
    name: test
    env:
      RUST_BACKTRACE: 1
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
        - build: stable
          os: ubuntu-latest
          rust: stable
        - build: stable-musl
          os: ubuntu-latest
          rust: stable
          target: x86_64-unknown-linux-musl
        - build: 1.92-aarch64-musl
          os: ubuntu-latest
          rust: 1.92.0
          target: aarch64-unknown-linux-gnu
        - build: 1.92-aarch64-musl
          os: ubuntu-latest
          rust: 1.92.0
          target: aarch64-unknown-linux-musl
        - build: macos
          os: macos-latest
          rust: stable
        - build: win-msvc
          os: windows-latest
          rust: stable
          
    steps:
    - name: Checkout repository
      uses: actions/checkout@v7
      
    - name: Install Rust
      uses: dtolnay/rust-toolchain@master
      with:
        toolchain: ${{ matrix.rust }}

    - name: Use rust cache
      uses: Swatinem/rust-cache@v2

    - name: Print info
      run: cargo --version

    - name: Build luatalk
      run: cargo build --verbose
  
    - name: Run tests
      run: cargo test --all-features
    
  checkfmt:
    name: check format
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v7
    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        components: rustfmt
    - name: Check formatting
      run: cargo fmt --all --check
