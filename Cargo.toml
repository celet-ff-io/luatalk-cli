[package]
name = "luatalk-cli"
version = "0.1.0-alpha"
edition = "2024"

[dependencies]
anyhow = "1.0.102"
clap = { version = "4.6.1", features = ["derive"] }
clap-stdin = "0.8.1"
dioxus = { version = "0.7.9", features = ["ssr"] }
mlua = { version = "0.11.6", features = [
  "anyhow",
  "lua55",
  "serde",
  "vendored",
] }
serde = "1.0.228"
tap = "1.0.1"
thiserr = "0.1.0"
