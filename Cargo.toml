[package]
name = "luatalk-cli"
version = "0.1.0-alpha"
authors = ["celet-ff-io"]
edition = "2024"
rust-version = "1.95"
description = ""
readme = "README.md"
homepage = "https://github.com/celet-ff-io/luatalk-cli"
repository = "https://github.com/celet-ff-io/luatalk-cli"

[dependencies]
anyhow = "1.0.102"
clap = { version = "4.6.1", features = ["derive"] }
clap-stdin = "0.8.1"
clap-verbosity-flag = "3.0.4"
dioxus = { version = "0.7.9", features = ["ssr"] }
env_logger = "0.11.10"
log = "0.4.33"
mlua = { version = "0.11.6", features = [
  "anyhow",
  "lua55",
  "serde",
  "vendored",
] }
serde = "1.0.228"
tap = "1.0.1"
thiserr = "0.1.0"
